<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live2D Minimal Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            background: transparent;
        }

        body {
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
            background: transparent;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: transparent;
        }
    </style>

    <!-- 先覆盖 fetch，允许通过 JavaScript Channel 加载资源 -->
    <script>
        let _assetCallbacks = {};
        let _binaryAssetCallbacks = {};
        let _callbackCounter = 0;

        // Receive text assets
        window._assetLoaded = (callbackId, content, error) => {
            const callback = _assetCallbacks[callbackId];
            if (callback) {
                callback(content, error);
                delete _assetCallbacks[callbackId];
            }
        };

        // Receive binary assets
        window._binaryAssetLoaded = (callbackId, dataUrl, error) => {
            const callback = _binaryAssetCallbacks[callbackId];
            if (callback) {
                callback(dataUrl, error);
                delete _binaryAssetCallbacks[callbackId];
            }
        };

        // Will be replaced by Flutter with base64 data URLs before load
        window._preloadedTextures = /*__PRELOADED_TEXTURES__*/ {};

        function injectTexturesIntoModelJson(jsonText) {
            try {
                const obj = JSON.parse(jsonText);
                const textures = obj?.FileReferences?.Textures;
                if (Array.isArray(textures) && window._preloadedTextures) {
                    const updated = textures.map((t) => {
                        const fileName = String(t || '').split('/').pop();
                        const key = fileName?.replace('.png', '') || '';
                        const replacement = window._preloadedTextures[key];
                        // Return replacement if available (could be blob URL or data URL)
                        return replacement || t;
                    });
                    if (obj.FileReferences) {
                        obj.FileReferences.Textures = updated;
                    }
                    // Return as JSON string
                    return JSON.stringify(obj);
                }
            } catch (e) {
                console.warn('[ModelJSON] Failed to inject textures:', e);
            }
            return jsonText;
        }

        const xhrFetch = (input, init = {}) => {
            const url = typeof input === 'string' ? input : input.url;

            // Debug: log all fetch requests
            console.log(`[Fetch] URL: ${url}, responseType: ${init.responseType}`);

            // Handle appassets protocol
            if (url.startsWith('https://appassets.androidplatform.net/assets/')) {
                console.log(`[Fetch] Intercept appassets URL: ${url}`);
                return new Promise((resolve, reject) => {
                    const assetPath = url.replace('https://appassets.androidplatform.net/', '');
                    const callbackId = `${Date.now()}_${++_callbackCounter}`;
                    // Determine binary by file extension (fetch doesn't carry responseType)
                    const lower = assetPath.toLowerCase();
                    const isBinary = /\.(png|jpg|jpeg|moc3|mp3|wav)$/i.test(lower);

                    console.log(`[Fetch] assetPath: ${assetPath}, isBinary: ${isBinary}, callbackId: ${callbackId}`);

                    if (isBinary) {
                        _binaryAssetCallbacks[callbackId] = (dataUrl, error) => {
                            if (error) {
                                console.error(`[Binary Asset] Load failed ${callbackId}: ${error}`);
                                reject(new Error(`Asset loading failed: ${error}`));
                            } else if (dataUrl) {
                                // dataUrl -> ArrayBuffer -> Blob with correct MIME
                                try {
                                    const match = dataUrl.match(/^data:([^;]+);base64,/i);
                                    const mime = match ? match[1] : 'application/octet-stream';
                                    const base64Part = dataUrl.split(',')[1];
                                    const bstr = atob(base64Part);
                                    const bytes = new Uint8Array(bstr.length);
                                    for (let i = 0; i < bstr.length; i++) {
                                        bytes[i] = bstr.charCodeAt(i);
                                    }
                                    const blob = new Blob([bytes], { type: mime });
                                    console.log(`[Binary Asset] Loaded ${callbackId}: ${bstr.length} bytes, mime: ${mime}`);
                                    resolve(new Response(blob, { status: 200 }));
                                } catch (e) {
                                    console.error(`[Binary Asset] Decode failed ${callbackId}:`, e);
                                    reject(new Error(`Failed to decode base64: ${e.message}`));
                                }
                            } else {
                                console.error(`[Binary Asset] No data ${callbackId}`);
                                reject(new Error('Asset not loaded'));
                            }
                        };
                        console.log(`[Binary Asset] Request ${assetPath} with ID ${callbackId}`);
                        BinaryAssetLoader.postMessage(`${assetPath}|${callbackId}`);
                    } else {
                        _assetCallbacks[callbackId] = (content, error) => {
                            if (error) {
                                reject(new Error(`Asset loading failed: ${error}`));
                            } else if (content != null) {
                                // Create Response with text() and json() support
                                const contentStr = String(content);
                                const isJson = /\.(json|model3.json|motion3.json|pose3.json|physics3.json|userdata3.json)$/i.test(assetPath);
                                const response = new Response(contentStr, {
                                    status: 200,
                                    statusText: 'OK',
                                    headers: new Headers({
                                        'Content-Type': isJson ? 'application/json' : 'text/plain'
                                    })
                                });

                                // Ensure text() and json() methods work
                                if (!response.text) {
                                    response.text = () => Promise.resolve(contentStr);
                                }
                                if (!response.json) {
                                    response.json = () => Promise.resolve(isJson ? JSON.parse(contentStr) : JSON.parse(contentStr));
                                }

                                resolve(response);
                            } else {
                                reject(new Error('Asset not loaded'));
                            }
                        };
                        AssetLoader.postMessage(`${assetPath}|${callbackId}`);
                    }
                });
            }

            // Original XHR implementation
            return new Promise((resolve, reject) => {
                const xhr = new XMLHttpRequest();
                xhr.open(init.method || 'GET', url, true);
                xhr.responseType = init.responseType || 'arraybuffer';
                if (init.headers) {
                    Object.entries(init.headers).forEach(([k, v]) => xhr.setRequestHeader(k, v));
                }
                xhr.onload = () => {
                    const ok = xhr.status === 0 || (xhr.status >= 200 && xhr.status < 300);
                    if (ok) {
                        resolve(new Response(xhr.response, { status: xhr.status || 200 }));
                    } else {
                        reject(new Error(`XHR status ${xhr.status}`));
                    }
                };
                xhr.onerror = () => reject(new Error('XHR failed'));
                xhr.send(init.body);
            });
        };
        window.fetch = xhrFetch;

        // Patch XMLHttpRequest to intercept appassets loads as well
        (() => {
            const APP_ASSETS_PREFIX = 'https://appassets.androidplatform.net/';
            const origOpen = XMLHttpRequest.prototype.open;
            const origSend = XMLHttpRequest.prototype.send;

            function isBinaryPath(path) {
                return /\.(png|jpg|jpeg|moc3|mp3|wav)$/i.test(path);
            }

            XMLHttpRequest.prototype.open = function (method, url, async = true, user, password) {
                this._method = method;
                this._url = String(url);
                this._async = async !== false;
                this._intercept = this._url.startsWith(APP_ASSETS_PREFIX + 'assets/');
                if (this._intercept) {
                    console.log('[XHRPatch] Intercept', this._method, this._url);
                }
                return origOpen.apply(this, arguments);
            };

            XMLHttpRequest.prototype.send = function (body) {
                if (!this._intercept) {
                    return origSend.call(this, body);
                }
                try {
                    const assetPath = this._url.replace(APP_ASSETS_PREFIX, '');
                    const callbackId = `${Date.now()}_${++_callbackCounter}`;
                    const binary = isBinaryPath(assetPath);

                    const complete = (ok, resp, mime) => {
                        try {
                            const responseType = this.responseType || (binary ? 'arraybuffer' : 'text');
                            const headers = `content-type: ${mime || (binary ? 'application/octet-stream' : 'text/plain')}`;
                            // Define readonly props
                            try { Object.defineProperty(this, 'readyState', { value: 4 }); } catch (_) { }
                            try { Object.defineProperty(this, 'status', { value: ok ? 200 : 500 }); } catch (_) { }
                            try { Object.defineProperty(this, 'statusText', { value: ok ? 'OK' : 'ERROR' }); } catch (_) { }
                            try { Object.defineProperty(this, 'getAllResponseHeaders', { value: () => headers }); } catch (_) { }
                            try { Object.defineProperty(this, 'responseURL', { value: this._url }); } catch (_) { }

                            let responseValue = resp;
                            if (responseType === 'arraybuffer' && resp instanceof Blob) {
                                responseValue = resp.arrayBuffer ? undefined : resp; // will fill below
                            }

                            const finalize = (finalResp) => {
                                try { Object.defineProperty(this, 'response', { value: finalResp }); } catch (_) { this.response = finalResp; }
                                if (responseType === '' || responseType === 'text') {
                                    const text = typeof finalResp === 'string' ? finalResp : '';
                                    try { Object.defineProperty(this, 'responseText', { value: text }); } catch (_) { this.responseText = text; }
                                }
                                if (typeof this.onload === 'function') this.onload(new Event('load'));
                                if (typeof this.onreadystatechange === 'function') this.onreadystatechange(new Event('readystatechange'));
                            };

                            if (resp instanceof Blob && responseType === 'arraybuffer') {
                                resp.arrayBuffer().then(buf => finalize(buf));
                            } else {
                                finalize(responseValue);
                            }
                        } catch (e) {
                            console.warn('[XHRPatch] finalize error', e);
                            if (typeof this.onerror === 'function') this.onerror(new Event('error'));
                        }
                    };

                    if (binary) {
                        _binaryAssetCallbacks[callbackId] = (dataUrl, error) => {
                            if (error || !dataUrl) {
                                console.error('[XHRPatch] Binary load failed', assetPath, error);
                                complete(false, null, 'application/octet-stream');
                            } else {
                                try {
                                    const match = dataUrl.match(/^data:([^;]+);base64,/i);
                                    const mime = match ? match[1] : 'application/octet-stream';
                                    const base64Part = dataUrl.split(',')[1];
                                    const bstr = atob(base64Part);
                                    const bytes = new Uint8Array(bstr.length);
                                    for (let i = 0; i < bstr.length; i++) bytes[i] = bstr.charCodeAt(i);
                                    const blob = new Blob([bytes], { type: mime });
                                    console.log('[XHRPatch] Binary loaded', assetPath, 'mime:', mime, 'bytes:', bytes.length);
                                    complete(true, blob, mime);
                                } catch (e) {
                                    console.error('[XHRPatch] Decode error', e);
                                    complete(false, null, 'application/octet-stream');
                                }
                            }
                        };
                        BinaryAssetLoader.postMessage(`${assetPath}|${callbackId}`);
                    } else {
                        _assetCallbacks[callbackId] = (content, error) => {
                            if (error || content == null) {
                                console.error('[XHRPatch] Text load failed', assetPath, error);
                                complete(false, '');
                            } else {
                                let body = String(content);
                                if (assetPath.endsWith('.model3.json')) {
                                    body = injectTexturesIntoModelJson(body);
                                }
                                const wantsJson = this.responseType === 'json';
                                if (wantsJson) {
                                    try {
                                        complete(true, JSON.parse(body), 'application/json');
                                    } catch (e) {
                                        console.warn('[XHRPatch] JSON parse failed, returning raw body', e);
                                        complete(true, body, 'application/json');
                                    }
                                } else {
                                    complete(true, body, 'application/json');
                                }
                            }
                        };
                        AssetLoader.postMessage(`${assetPath}|${callbackId}`);
                    }
                } catch (e) {
                    console.warn('[XHRPatch] send error', e);
                    if (typeof this.onerror === 'function') this.onerror(new Event('error'));
                }
            };
        })();

        // Patch <img>.src to load appassets images via BinaryAssetLoader
        (() => {
            const imgProto = HTMLImageElement.prototype;
            const srcDesc = Object.getOwnPropertyDescriptor(imgProto, 'src');
            if (!srcDesc || !srcDesc.set || !srcDesc.get) {
                console.warn('[ImagePatch] Unable to patch HTMLImageElement.src');
                return;
            }
            const originalSet = srcDesc.set;
            const originalGet = srcDesc.get;

            Object.defineProperty(imgProto, 'src', {
                configurable: true,
                enumerable: true,
                get: function () { return originalGet.call(this); },
                set: function (value) {
                    try {
                        const url = String(value || '');
                        const isAppAssets = url.startsWith('https://appassets.androidplatform.net/assets/');
                        const isImage = /\.(png|jpg|jpeg)$/i.test(url);
                        if (isAppAssets && isImage) {
                            const assetPath = url.replace('https://appassets.androidplatform.net/', '');
                            const callbackId = `${Date.now()}_${++_callbackCounter}`;
                            console.log(`[ImagePatch] Intercept src: ${assetPath}, id=${callbackId}`);
                            _binaryAssetCallbacks[callbackId] = (dataUrl, error) => {
                                if (error || !dataUrl) {
                                    console.warn(`[ImagePatch] Fallback original URL due to: ${error || 'no data'}`);
                                    originalSet.call(this, url);
                                } else {
                                    try {
                                        const match = dataUrl.match(/^data:([^;]+);base64,/i);
                                        const mime = match ? match[1] : 'image/png';
                                        const base64Part = dataUrl.split(',')[1];
                                        const bstr = atob(base64Part);
                                        const bytes = new Uint8Array(bstr.length);
                                        for (let i = 0; i < bstr.length; i++) bytes[i] = bstr.charCodeAt(i);
                                        const blob = new Blob([bytes], { type: mime });
                                        const blobUrl = URL.createObjectURL(blob);
                                        originalSet.call(this, blobUrl);
                                        this.addEventListener('load', () => URL.revokeObjectURL(blobUrl), { once: true });
                                    } catch (e) {
                                        console.warn('[ImagePatch] Blob fallback failed, using dataUrl', e);
                                        originalSet.call(this, dataUrl);
                                    }
                                }
                            };
                            BinaryAssetLoader.postMessage(`${assetPath}|${callbackId}`);
                            return; // prevent setting original URL immediately
                        }
                    } catch (e) {
                        console.warn('[ImagePatch] Error in src interceptor', e);
                    }
                    originalSet.call(this, value);
                }
            });

            const originalSetAttribute = imgProto.setAttribute;
            imgProto.setAttribute = function (name, value) {
                if (String(name).toLowerCase() === 'src') {
                    // Route through our patched setter
                    this.src = value;
                } else {
                    originalSetAttribute.call(this, name, value);
                }
            };
        })();
    </script>

    <!-- 配置 Cubism Core 不使用 wasm (使用 asm.js fallback) -->
    <script>
        window._em_module = {
            locateFile: function (path) {
                // 如果是 wasm 文件,返回空 - 强制使用 asm.js
                if (path.endsWith('.wasm')) {
                    console.log('Blocking wasm load, using asm.js fallback');
                    return '';
                }
                return path;
            }
        };
    </script>

    <!-- 加载PIXI和Live2D库 -->
    <script src="https://appassets.androidplatform.net/assets/live2d/libs/pixi.min.js"></script>
    <script src="https://appassets.androidplatform.net/assets/live2d/libs/live2dcubismcore.min.js"></script>
    <script src="https://appassets.androidplatform.net/assets/live2d/libs/pixi-live2d-display.min.js"></script>
</head>

<body>
    <div id="container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        let app = null;
        let modelLayer = null;
        let model = null;
        const MOTION_PRIORITY_FORCE = 100;
        const MOTION_PRIORITY_BASE = 1;
        // Keep HTML Y anchor neutral; let Flutter verticalOffset drive final Y movement.
        const LAYER_BASE_Y_RATIO = 0.5;
        const LAYER_OFFSET_Y_PX = 0;
        const LAYER_OFFSET_X_PX = 0;
        const ENABLE_TOP_CLAMP = true;
        const SAFE_TOP_PADDING_PX = 16;
        const MAX_TOP_CLAMP_PX = 48;
        const MODEL_SCALE = 0.24;
        const TAP_ZONE_WIDTH_RATIO = 0.35;
        const TAP_ZONE_HEIGHT_RATIO = 0.86;
        let _externalOffsetX = 0;
        let _externalOffsetY = 0;
        let _currentCharacterState = 'normal';
        let _pendingCharacterState = null;
        let _isTransientMotionPlaying = false;
        let _motionGroupNameMap = {};
        let _canPlaySmileOnTap = true;
        const ANGRY_MOTION_DURATION_MS = 5210;
        const START_MOTION_FALLBACK_MS = 1400;
        let _startMotionDurationMs = START_MOTION_FALLBACK_MS;
        let _startInitialParams = {};
        const SMILE_MOTION_DURATION_MS = 2030;
        const TALK_MOTION_DURATION_MS = 2030;

        function resolveModelAssetUrl(relativePath) {
            return new URL(String(relativePath || ''), document.baseURI).toString();
        }

        function toAbsoluteModelPath(path) {
            const raw = String(path || '');
            if (!raw || raw.startsWith('http') || raw.startsWith('data:') || raw.startsWith('blob:')) {
                return raw;
            }
            return resolveModelAssetUrl(raw);
        }

        function resolveMotionGroupName(group) {
            const raw = String(group || '');
            const key = raw.toLowerCase();
            return _motionGroupNameMap[key] || raw;
        }

        function keepModelInViewport(bottomMargin = 8) {
            // Disabled to avoid motion-time vertical snapping/jitter.
            return;
        }

        function setViewportOffset(x = 0, y = 0) {
            _externalOffsetX = Number(x) || 0;
            _externalOffsetY = Number(y) || 0;
            if (typeof window._applyVerticalAlignment === 'function') {
                try {
                    window._applyVerticalAlignment(window.innerWidth, window.innerHeight);
                } catch (e) {
                    console.warn('[Live2D] setViewportOffset apply failed', e);
                }
            }
        }

        window.setViewportOffset = setViewportOffset;

        function getPointerGlobalPoint(event) {
            const point = event?.global || event?.data?.global;
            if (!point || !Number.isFinite(point.x) || !Number.isFinite(point.y)) {
                return null;
            }
            return { x: Number(point.x), y: Number(point.y) };
        }

        function isPointerWithinTapZone(event) {
            if (!model) {
                return false;
            }

            const p = getPointerGlobalPoint(event);
            if (!p) {
                // If pointer data is unavailable, don't block a valid model pointertap.
                return true;
            }

            try {
                const localBounds = model.getLocalBounds();
                const width = Number(localBounds?.width) || 0;
                const height = Number(localBounds?.height) || 0;
                if (width <= 0 || height <= 0) {
                    return true;
                }

                const x0 = Number(localBounds?.x) || 0;
                const y0 = Number(localBounds?.y) || 0;
                const cx = x0 + width / 2;
                const cy = y0 + height / 2;
                const zoneW = width * TAP_ZONE_WIDTH_RATIO;
                const zoneH = height * TAP_ZONE_HEIGHT_RATIO;

                let localPoint = null;
                if (typeof PIXI !== 'undefined' && PIXI?.Point && typeof model.toLocal === 'function') {
                    localPoint = model.toLocal(new PIXI.Point(p.x, p.y));
                }
                if (!localPoint || !Number.isFinite(localPoint.x) || !Number.isFinite(localPoint.y)) {
                    return true;
                }

                const left = cx - zoneW / 2;
                const right = cx + zoneW / 2;
                const top = cy - zoneH / 2;
                const bottom = cy + zoneH / 2;

                return localPoint.x >= left && localPoint.x <= right && localPoint.y >= top && localPoint.y <= bottom;
            } catch (e) {
                console.warn('[Live2D] tap-zone check failed', e);
                return true;
            }
        }

        function extractInitialParameterValuesFromMotion(motionJson) {
            const result = {};
            const curves = motionJson?.Curves;
            if (!Array.isArray(curves)) {
                return result;
            }

            for (const curve of curves) {
                if (curve?.Target !== 'Parameter' || !curve?.Id) {
                    continue;
                }
                const segments = curve?.Segments;
                if (!Array.isArray(segments) || segments.length < 2) {
                    continue;
                }
                const initialValue = Number(segments[1]);
                if (Number.isFinite(initialValue)) {
                    result[String(curve.Id)] = initialValue;
                }
            }

            return result;
        }

        function applyStartInitialPoseToModel() {
            const coreModel = model?.internalModel?.coreModel;
            if (!coreModel || typeof coreModel.setParameterValueById !== 'function') {
                return false;
            }

            let applied = 0;
            for (const [paramId, value] of Object.entries(_startInitialParams || {})) {
                try {
                    coreModel.setParameterValueById(paramId, value);
                    applied += 1;
                } catch (_) {
                    // Ignore missing parameter IDs to keep compatibility.
                }
            }

            return applied > 0;
        }

        function updateStatus(message) {
            console.log('[Live2D]', message);
            if (window.Live2DController) {
                Live2DController.postMessage(message);
            }
        }

        function triggerSmileMotion() {
            if (!_canPlaySmileOnTap) {
                return;
            }
            _canPlaySmileOnTap = false;
            _isTransientMotionPlaying = true;
            const isStudy = _currentCharacterState === 'study';
            const randomTapMotion = Math.random() < 0.5 ? 'Smile' : 'Talk';
            const tapMotion = isStudy ? 'Angry' : randomTapMotion;
            const recoverDelay =
                tapMotion === 'Angry'
                    ? ANGRY_MOTION_DURATION_MS
                    : (tapMotion === 'Talk' ? TALK_MOTION_DURATION_MS : SMILE_MOTION_DURATION_MS);

            updateStatus(`Model clicked! Trigger ${tapMotion}`);
            playMotionByName(tapMotion, 0);
            setTimeout(() => {
                _canPlaySmileOnTap = true;
                _isTransientMotionPlaying = false;
                flushQueuedCharacterState();
            }, recoverDelay);
        }

        function flushQueuedCharacterState() {
            if (_isTransientMotionPlaying || !model) {
                return;
            }

            const next = _pendingCharacterState || _currentCharacterState;
            _pendingCharacterState = null;

            // Wait one frame before restoring base loop to avoid visible snap at transient end.
            requestAnimationFrame(() => {
                if (_isTransientMotionPlaying || !model) {
                    return;
                }
                if (next === 'study') {
                    playMotionByName('Study', 0);
                } else {
                    playMotionByName('Normal', 0);
                }
            });
        }

        // Preload textures and register in PIXI Assets system
        async function preloadTextures(app) {
            console.log('[Preload] Using Flutter-injected textures...');

            if (!window._preloadedTextures) {
                console.warn('[Preload] No preloaded textures object from Flutter, fallback to runtime loading');
                return;
            }

            const textureEntries = Object.entries(window._preloadedTextures)
                .filter(([_, dataUrl]) => typeof dataUrl === 'string' && dataUrl.startsWith('data:image'));

            if (textureEntries.length === 0) {
                console.warn('[Preload] No valid preloaded textures, fallback to runtime loading');
                return;
            }

            for (const [textureKey, dataUrl] of textureEntries) {
                const url = resolveModelAssetUrl(`hiyori_movie_pro_t03.4096/${textureKey}.png`);

                console.log('[Preload] Loading', textureKey, 'from data URL...');

                // Create image from data URL
                const img = new Image();
                img.crossOrigin = 'anonymous';

                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = () => reject(new Error('Image load failed'));
                    img.src = dataUrl;
                });

                console.log('[Preload] Image loaded:', url, `${img.width}x${img.height}`);

                // Create PIXI Texture directly from HTMLImageElement
                const texture = PIXI.Texture.from(img);

                // Register in PIXI Assets cache with all possible URL formats
                PIXI.Assets.cache.set(url, texture);
                // Also register relative path and file-name variations.
                const fileName = `${textureKey}.png`;
                const relativePath = `hiyori_movie_pro_t03.4096/${fileName}`;
                PIXI.Assets.cache.set(relativePath, texture);
                PIXI.Assets.cache.set(fileName, texture);

                console.log('[Preload] Texture registered:', url);
            }

            console.log('[Preload] All textures loaded from Flutter injection');
        }

        // Init
        async function init() {
            updateStatus('Checking PIXI...');

            // 1. Check PIXI
            if (typeof PIXI === 'undefined') {
                updateStatus('❌ PIXI not loaded');
                return;
            }
            updateStatus('✅ PIXI loaded');

            // 2. Check Live2D plugin
            if (!PIXI.live2d || !PIXI.live2d.Live2DModel) {
                updateStatus('❌ Live2D plugin not loaded');
                return;
            }
            updateStatus('✅ Live2D plugin loaded');

            // 3. Wait for Live2D core to be ready
            if (typeof window.Live2DCubismCore === 'undefined') {
                console.log('[Init] Waiting for Live2D Cubism Core...');
                await new Promise(resolve => {
                    const check = setInterval(() => {
                        if (typeof window.Live2DCubismCore !== 'undefined') {
                            clearInterval(check);
                            resolve();
                        }
                    }, 100);
                });
            }
            console.log('[Init] Live2D Cubism Core ready');

            // 4. Create PIXI app FIRST (Pixi v7+ needs await init/create)
            try {
                // Suppress WebGL warnings in console (Cubism SDK shader issue)
                const originalWarn = console.warn;
                const originalError = console.error;
                console.warn = function (...args) {
                    const msg = args.join(' ');
                    if (!msg.includes('RENDER WARNING: there is no texture bound')) {
                        originalWarn.apply(console, args);
                    }
                };
                console.error = function (...args) {
                    const msg = args.join(' ');
                    if (!msg.includes('RENDER WARNING: there is no texture bound')) {
                        originalError.apply(console, args);
                    }
                };

                app = new PIXI.Application({
                    view: document.getElementById('canvas'),
                    resizeTo: window,
                    backgroundAlpha: 0,
                    antialias: true,
                    preserveDrawingBuffer: false,
                    powerPreference: 'high-performance'
                });
                
                // 确保 canvas 元素完全透明
                const canvas = document.getElementById('canvas');
                if (canvas) {
                    canvas.style.backgroundColor = 'transparent';
                }

                updateStatus('PIXI app created');

                // 5. Preload textures AFTER PIXI app is created
                try {
                    updateStatus('Preloading textures...');
                    await preloadTextures(app);
                    updateStatus('✅ Textures preloaded');
                } catch (error) {
                    console.error('[Init] Texture preload failed:', error);
                    updateStatus('❌ Texture preload failed!');
                    throw error;
                }

                // 6. Create Live2D model (Hiyori)
                updateStatus('Creating Live2D model...');

                // Pre-load model JSON, inject textures, then load from blob URL
                const modelUrl = resolveModelAssetUrl('hiyori_movie_pro_t03.model3.json');
                updateStatus(`Loading model: ${modelUrl}`);

                try {
                    console.log('[Live2D] Starting model load...');

                    // Step 1: Fetch raw model JSON as text
                    const modelResponse = await xhrFetch(modelUrl);
                    const modelJsonText = await modelResponse.text();
                    const modelJson = JSON.parse(modelJsonText);
                    console.log('[Live2D] Model JSON loaded, injecting textures...');

                    // Step 2: Inject preloaded textures and convert all paths to absolute URLs
                    const textures = modelJson?.FileReferences?.Textures;
                    if (Array.isArray(textures) && window._preloadedTextures) {
                        modelJson.FileReferences.Textures = textures.map((t) => {
                            const fileName = String(t || '').split('/').pop();
                            const key = fileName?.replace('.png', '') || '';
                            return window._preloadedTextures[key] || toAbsoluteModelPath(t);
                        });
                    }

                    // Convert all relative paths to absolute URLs
                    ['Moc', 'Pose', 'UserData', 'Physics', 'DisplayInfo'].forEach(key => {
                        if (modelJson?.FileReferences?.[key]) {
                            modelJson.FileReferences[key] = toAbsoluteModelPath(modelJson.FileReferences[key]);
                        }
                    });

                    if (Array.isArray(modelJson?.FileReferences?.Expressions)) {
                        modelJson.FileReferences.Expressions = modelJson.FileReferences.Expressions.map((expr) => {
                            if (expr?.File) {
                                return { ...expr, File: toAbsoluteModelPath(expr.File) };
                            }
                            return expr;
                        });
                    }

                    // Handle motions
                    if (modelJson?.FileReferences?.Motions) {
                        // Build a case-insensitive group name map to avoid mismatch between code and model json.
                        _motionGroupNameMap = {};
                        Object.keys(modelJson.FileReferences.Motions).forEach((name) => {
                            _motionGroupNameMap[String(name).toLowerCase()] = name;
                        });

                        for (const [group, motions] of Object.entries(modelJson.FileReferences.Motions)) {
                            if (!Array.isArray(motions)) {
                                continue;
                            }

                            for (let idx = 0; idx < motions.length; idx++) {
                                const motion = motions[idx];
                                if (!motion?.File) {
                                    continue;
                                }

                                const original = motion.File;
                                const absoluteUrl = toAbsoluteModelPath(original);

                                // Android WebView 对 blob: motion URL 存在拦截问题，
                                // 这里保持为 appassets 绝对路径，并做一次预读验证可达性。
                                try {
                                    const motionResponse = await xhrFetch(absoluteUrl);
                                    if (String(group).toLowerCase() === 'start' && idx === 0) {
                                        try {
                                            const motionText = await motionResponse.text();
                                            const motionJson = JSON.parse(motionText);
                                            const durationSec = Number(motionJson?.Meta?.Duration || 0);
                                            if (Number.isFinite(durationSec) && durationSec > 0) {
                                                _startMotionDurationMs = Math.min(Math.round(durationSec * 1000), 20000);
                                            }
                                            _startInitialParams = extractInitialParameterValuesFromMotion(motionJson);
                                        } catch (e) {
                                            console.warn('[Live2D] parse start motion failed:', e);
                                        }
                                    }
                                } catch (e) {
                                    console.warn('[Live2D][MotionPreload] motion precheck failed:', absoluteUrl, e);
                                }
                                motions[idx].File = absoluteUrl;

                            }
                        }
                    }

                    console.log('[Live2D] Textures and paths injected');

                    // Step 3: Create blob URL from modified JSON
                    const modifiedJson = JSON.stringify(modelJson);
                    const blob = new Blob([modifiedJson], { type: 'application/json' });
                    const blobUrl = URL.createObjectURL(blob);
                    console.log('[Live2D] Created blob URL for model:', blobUrl);

                    // Step 4: Load from blob URL (no interception needed)
                    model = await PIXI.live2d.Live2DModel.from(blobUrl, {
                        autoInteract: false
                    });
                    console.log('[Live2D] Model loaded!');
                    updateStatus('✅ Model loaded');

                    // Clean up blob URL after loading
                    URL.revokeObjectURL(blobUrl);
                } catch (error) {
                    console.error('[Live2D] Model load failed:', error);
                    updateStatus(`❌ Model load failed: ${error.message}`);
                    throw error;
                }

                // 使用外层容器承接全局平移，避免与模型内部动画位移互相干扰。
                modelLayer = new PIXI.Container();
                app.stage.addChild(modelLayer);
                modelLayer.addChild(model);

                // 只做缩放和水平居中；不干预纵向位移，交由动画自身控制
                try {
                    function applyVerticalAlignment(w, h) {
                        try {
                            const width = Number(w || window.innerWidth);
                            const height = Number(h || window.innerHeight);

                            // 略微回调缩放，避免头部动画被遮盖
                            model.scale.set(MODEL_SCALE);

                            // 计算并设置 pivot 为局部中心（使 position 成为可视中心）
                            try {
                                const localBounds = model.getLocalBounds();
                                const pivotX = (localBounds.x || 0) + (localBounds.width || 0) / 2;
                                const pivotY = (localBounds.y || 0) + (localBounds.height || 0) / 2;
                                if (model.pivot && typeof model.pivot.set === 'function') {
                                    model.pivot.set(pivotX, pivotY);
                                } else if (model.anchor && typeof model.anchor.set === 'function') {
                                    model.anchor.set(0.5, 0.5);
                                }
                            } catch (e) {
                                console.warn('[Live2D] Failed to set pivot from local bounds', e);
                            }

                            // 模型本体保持原点，由外层容器统一做全局位移。
                            model.position.x = 0;
                            model.position.y = 0;

                            // 水平居中给外层容器
                            if (modelLayer) {
                                modelLayer.x = width / 2 + LAYER_OFFSET_X_PX + _externalOffsetX;
                                modelLayer.y = Math.round(height * LAYER_BASE_Y_RATIO) + LAYER_OFFSET_Y_PX + _externalOffsetY;

                                // Optional top clamp: disable to allow free upward movement.
                                if (ENABLE_TOP_CLAMP && !_isTransientMotionPlaying) {
                                    try {
                                        const bounds = model.getBounds();
                                        const topOverflow = SAFE_TOP_PADDING_PX - (Number(bounds?.y) || 0);
                                        if (topOverflow > 0) {
                                            // Soft clamp: avoid pinning Y completely so vertical offset still works.
                                            modelLayer.y += Math.min(topOverflow, MAX_TOP_CLAMP_PX);
                                        }
                                    } catch (e) {
                                        console.warn('[Live2D] top safe-area correction failed', e);
                                    }
                                }
                            }

                        } catch (e) {
                            console.warn('[Live2D] applyVerticalAlignment failed', e);
                        }
                    }

                    // 执行一次对齐
                    applyVerticalAlignment(window.innerWidth, window.innerHeight);
                    // WebView 初次进入时补做一次对齐。
                    setTimeout(() => {
                        if (!_isTransientMotionPlaying) {
                            applyVerticalAlignment(window.innerWidth, window.innerHeight);
                        }
                    }, 200);

                    // 在窗口 resize 时仅做水平居中
                    window._applyVerticalAlignment = applyVerticalAlignment;
                } catch (e) {
                    console.log('[Live2D] Error setting model properties:', e.message);
                }

                // 允许交互
                model.eventMode = 'static';
                model.cursor = 'pointer';

                // 开屏修复：先写入 Start 首帧参数，再可见并播放 Start，避免首帧闪到默认姿态。
                model.alpha = 0;
                _isTransientMotionPlaying = true;

                const preApplied = applyStartInitialPoseToModel();
                if (preApplied) {
                    updateStatus('[Init] Start first-frame parameters pre-applied');
                }

                const startPlayed = await playMotionByName('Start', 0);
                if (!startPlayed) {
                    updateStatus('[Init] Start motion unavailable, fallback to state motion');
                }

                await new Promise((resolve) => requestAnimationFrame(resolve));
                model.alpha = 1;

                await new Promise((resolve) => setTimeout(resolve, startPlayed ? _startMotionDurationMs : 0));
                _isTransientMotionPlaying = false;
                flushQueuedCharacterState();

                updateStatus('✅ Live2D ready! Model is visible on screen.');

                // Tap interaction - only on the Live2D model itself
                model.on('pointertap', (event) => {
                    if (!isPointerWithinTapZone(event)) {
                        return;
                    }
                    triggerSmileMotion();
                });

            } catch (error) {
                updateStatus(`❌ Error: ${error.message}`);
                console.error(error);
            }
        }

        // Controls
        function playMotion(motionName) {
            if (!model) return;
            if (model.motion) {
                model.motion(motionName, 0, MOTION_PRIORITY_FORCE);
                updateStatus(`Play motion: ${motionName}`);
            } else if (model.internalModel?.motionManager) {
                model.internalModel.motionManager.startMotion(motionName, 0, MOTION_PRIORITY_FORCE);
                updateStatus(`Play motion: ${motionName}`);
            } else {
                updateStatus('Motion control not supported');
            }
        }

        async function playMotionByName(group, index = 0) {
            if (!model) return false;

            const resolvedGroup = resolveMotionGroupName(group);
            const isBaseStateMotion = resolvedGroup === 'Normal' || resolvedGroup === 'Study';
            const motionPriority = isBaseStateMotion ? MOTION_PRIORITY_BASE : MOTION_PRIORITY_FORCE;

            // Only hard-cut transient motions. Base state restore should be softer.
            if (!isBaseStateMotion) {
                try {
                    if (model.internalModel?.motionManager?.stopAllMotions) {
                        model.internalModel.motionManager.stopAllMotions();
                    }
                } catch (_) { }
            }

            let played = false;

            try {
                if (model.internalModel?.motionManager?.startMotion) {
                    const result = model.internalModel.motionManager.startMotion(
                        resolvedGroup,
                        index,
                        motionPriority
                    );
                    const resolved = result instanceof Promise ? await result : result;
                    played = resolved !== false;
                }
            } catch (e) {
                console.warn('[Live2D] startMotion failed:', e);
            }

            if (!played && model.motion) {
                try {
                    const highResult = model.motion(resolvedGroup, index, motionPriority);
                    const resolvedHigh = highResult instanceof Promise ? await highResult : highResult;
                    played = resolvedHigh !== false;
                } catch (_) {
                    try {
                        const fallback = model.motion(resolvedGroup);
                        const resolvedFallback = fallback instanceof Promise ? await fallback : fallback;
                        played = resolvedFallback !== false;
                    } catch (e) {
                        console.warn('[Live2D] model.motion failed:', e);
                    }
                }
            }

            // Base state motion may be rejected at low priority in some runtime states.
            // Retry once with force priority to keep state switching reliable.
            if (!played && isBaseStateMotion) {
                try {
                    if (model.internalModel?.motionManager?.startMotion) {
                        const forceResult = model.internalModel.motionManager.startMotion(
                            resolvedGroup,
                            index,
                            MOTION_PRIORITY_FORCE
                        );
                        const resolvedForce = forceResult instanceof Promise ? await forceResult : forceResult;
                        played = resolvedForce !== false;
                    }
                } catch (e) {
                    console.warn('[Live2D] base motion force retry failed:', e);
                }

                if (!played && model.motion) {
                    try {
                        const forceHighResult = model.motion(resolvedGroup, index, MOTION_PRIORITY_FORCE);
                        const resolvedForceHigh = forceHighResult instanceof Promise ? await forceHighResult : forceHighResult;
                        played = resolvedForceHigh !== false;
                    } catch (e) {
                        console.warn('[Live2D] base motion force retry via model.motion failed:', e);
                    }
                }
            }

            updateStatus(`[Motion] ${resolvedGroup}[${index}] -> ${played ? 'ok' : 'fail'}`);
            return played;
        }

        function setCharacterState(state) {
            const next = String(state || 'normal').toLowerCase();
            _currentCharacterState = next;

            if (!model) {
                _pendingCharacterState = next;
                return;
            }

            if (_isTransientMotionPlaying) {
                _pendingCharacterState = next;
                updateStatus(`[State] queued -> ${next}`);
                return;
            }

            _pendingCharacterState = null;
            flushQueuedCharacterState();
        }

        window.setCharacterState = setCharacterState;
        window.playMotionByName = playMotionByName;


        function changeExpression(exprName) {
            if (!model) return;
            if (model.expression) {
                model.expression(exprName);
                updateStatus(`Change expression: ${exprName}`);
            } else if (model.internalModel?.expressionManager) {
                const mgr = model.internalModel.expressionManager;
                const idx = mgr.expressions?.findIndex(e => e?.name === exprName) ?? -1;
                if (idx >= 0) {
                    mgr.setExpression(mgr.expressions[idx]);
                    updateStatus(`Change expression: ${exprName}`);
                } else {
                    updateStatus('Expression not found');
                }
            } else {
                updateStatus('Expression control not supported');
            }
        }

        // On page load
        window.addEventListener('load', () => {
            updateStatus('Page loaded');
            console.log('[Live2D] Starting init...');
            init().catch(err => {
                updateStatus(`❌ Init error: ${err.message}`);
                console.error('[Live2D] init() error:', err);
            });
        });

        // 窗口大小调整：重置画布并复用对齐逻辑
        window.addEventListener('resize', () => {
            if (app && app.canvas) {
                const width = window.innerWidth;
                const height = window.innerHeight;
                app.view.width = width;
                app.view.height = height;
                try { app.renderer.resize(width, height); } catch (_) { }
            }
            if (app && model && typeof window._applyVerticalAlignment === 'function') {
                try { window._applyVerticalAlignment(window.innerWidth, window.innerHeight); } catch (e) { console.warn('resize alignment failed', e); }
            }
        });

    </script>
</body>

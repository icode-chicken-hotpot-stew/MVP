name: mvp_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  webview_flutter: 4.11.0
  webview_flutter_android: 4.10.11
  shared_preferences: ^2.5.3
  just_audio: ^0.10.5
  flutter_local_notifications: ^19.4.2
  timezone: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.11.0

flutter:
  uses-material-design: true
  assets:
    - assets/background_back.png
    - assets/background_front.png
    - assets/background.webp
    - assets/dialogues/
    - assets/images/
    - assets/music/
    - assets/sfx/
    - assets/live2d/hiyori_viewer.html
    - assets/live2d/libs/
    - assets/live2d/hiyori/
    - assets/live2d/hiyori_pro/
    - assets/live2d/hiyori_pro/motion/
    - assets/live2d/hiyori_pro/hiyori_movie_pro_t03.4096/
    - assets/live2d/hiyori/Hiyori.2048/
  fonts:
    - family: ZhuoKai
      fonts:
        - asset: assets/fonts/ZhuoKai.ttf
    - family: ZCOOLKuaiLe-Regular
      fonts:
        - asset: assets/fonts/ZCOOLKuaiLe-Regular.ttf

flutter_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"

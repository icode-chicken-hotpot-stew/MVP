name: mvp_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  webview_flutter: ^4.11.0
  webview_flutter_android: ^4.10.11
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/background.webp
    - assets/images/
    - assets/live2d/hiyori_viewer.html
    - assets/live2d/libs/
    - assets/live2d/hiyori/
    - assets/live2d/hiyori/Hiyori.2048/

fonts:
  - family: ZhuoKai
    fonts:
      - asset: assets/fonts/Jiangxizhuokai.ttf
  - family: ZCOOLKuaiLe-Regular
    fonts:
      - asset: assets/fonts/ZCOOLKuaiLe-Regular.ttf